name: Build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string

env:
  HAXE_VERSION: 4.3.7
  PROJECT_NAME: FrozenEngine

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Setup Android NDK
        if: inputs.name == 'Android'
        id: setup-ndk
        uses: nttld/setup-ndk@main
        with:
          ndk-version: r28c
          add-to-path: false

      - name: Install libVLC
        if: contains(inputs.name, 'Linux')
        run: sudo apt install libvlc-dev libvlccore-dev

      - name: Install Libraries
        run: ${{ inputs.setupCommand }}

      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: |
          # 仅在编译 Android 时设置 JVM 内存参数
          if [[ "${{ inputs.name }}" == "Android" ]]; then
            echo "Setting Gradle memory options for Android build..."
            export GRADLE_OPTS="-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=1024m"
            export JAVA_OPTS="-Xmx2048m -Xms512m"
            echo "GRADLE_OPTS=$GRADLE_OPTS"
            echo "JAVA_OPTS=$JAVA_OPTS"
          fi
          
          haxelib run lime build ${{ inputs.buildArgs }} -always
        env:
          # 仅在 Android 构建时设置这些环境变量
          GRADLE_OPTS: ${{ inputs.name == 'Android' && '-Xmx2048m -Xms512m -XX:MaxMetaspaceSize=1024m' || '' }}
          JAVA_OPTS: ${{ inputs.name == 'Android' && '-Xmx2048m -Xms512m' || '' }}

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos/${{ env.PROJECT_NAME }}.app
          ldid -S../../../${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.entitlements ${{ env.PROJECT_NAME }}
          cd ..
          mkdir Payload
          mv ${{ env.PROJECT_NAME }}.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error