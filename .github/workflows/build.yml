name: Build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string

env:
  HAXE_VERSION: 4.3.7
  PROJECT_NAME: FrozenEngine

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Setup Android NDK
        if: inputs.name == 'Android'
        id: setup-ndk
        uses: nttld/setup-ndk@main
        with:
          ndk-version: r28c
          add-to-path: false

      - name: Install libVLC
        if: contains(inputs.name, 'Linux')
        run: sudo apt install libvlc-dev libvlccore-dev

      - name: Install Libraries
        run: ${{ inputs.setupCommand }}

      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          haxelib run lime config ANDROID_SETUP true

      # 新增：配置 Gradle 内存
      - name: Configure Gradle Memory
        if: inputs.name == 'Android'
        run: |
          GRADLE_DIR="export/release/android/bin"
          
          # 创建 gradle.properties
          cat > $GRADLE_DIR/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.parallel=true
          org.gradle.daemon=false
          org.gradle.caching=true
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=false
          EOF
          
          echo "Gradle memory settings configured:"
          cat $GRADLE_DIR/gradle.properties
          
          # 设置环境变量作为备用
          echo "GRADLE_OPTS=-Xmx4g -XX:MaxMetaspaceSize=1g" >> $GITHUB_ENV
          echo "JAVA_OPTS=-Xmx4g -XX:MaxMetaspaceSize=1g" >> $GITHUB_ENV

      - name: Compile
        run: |
          if [[ "${{ inputs.name }}" == "Android" ]]; then
            # 设置 GRADLE_OPTS 环境变量
            export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=1g"
            haxelib run lime build ${{ inputs.buildArgs }} -always
          else
            haxelib run lime build ${{ inputs.buildArgs }} -always
          fi

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos/${{ env.PROJECT_NAME }}.app
          ldid -S../../../${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.entitlements ${{ env.PROJECT_NAME }}
          cd ..
          mkdir Payload
          mv ${{ env.PROJECT_NAME }}.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error